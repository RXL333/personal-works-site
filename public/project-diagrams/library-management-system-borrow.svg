<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="图书管理系统：借阅业务流程">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#17324a"/></linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fffb" stop-opacity=".96"/><stop offset="1" stop-color="#d9f3e2" stop-opacity=".92"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000" flood-opacity=".22"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".08"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#94e27d"/></marker>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect width="1200" height="720" rx="36" fill="url(#grid)"/>
  <text x="70" y="86" fill="#f4fff7" font-family="Microsoft YaHei, Arial, sans-serif" font-size="40" font-weight="900">图书管理系统：借阅业务流程</text>
  <text x="72" y="128" fill="#bdd7df" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="700">借出、续借、归还与库存变化的业务约束</text><g filter="url(#shadow)"><rect x="62" y="260" width="250" height="128" rx="26" fill="url(#soft)" stroke="#ffffff" stroke-opacity=".72"/>
  <circle cx="98" cy="298" r="10" fill="#89d7ff"/>
  <text x="120" y="307" fill="#14313a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="900">选择读者</text>
  <text x="96" y="348" fill="#5b7480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700">校验读者身份和状态</text> </g><path d="M317 324 C 331.5 324, 331.5 324, 346 324" fill="none" stroke="#94e27d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="354" y="260" width="250" height="128" rx="26" fill="url(#soft)" stroke="#ffffff" stroke-opacity=".72"/>
  <circle cx="390" cy="298" r="10" fill="#ffe18a"/>
  <text x="412" y="307" fill="#14313a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="900">选择图书</text>
  <text x="388" y="348" fill="#5b7480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700">检查库存与可借状态</text> </g><path d="M609 324 C 623.5 324, 623.5 324, 638 324" fill="none" stroke="#94e27d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="646" y="260" width="250" height="128" rx="26" fill="url(#soft)" stroke="#ffffff" stroke-opacity=".72"/>
  <circle cx="682" cy="298" r="10" fill="#94e27d"/>
  <text x="704" y="307" fill="#14313a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="900">登记借出</text>
  <text x="680" y="348" fill="#5b7480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700">生成借阅记录并扣减库存</text> </g><path d="M901 324 C 915.5 324, 915.5 324, 930 324" fill="none" stroke="#94e27d" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><g filter="url(#shadow)"><rect x="938" y="260" width="250" height="128" rx="26" fill="url(#soft)" stroke="#ffffff" stroke-opacity=".72"/>
  <circle cx="974" cy="298" r="10" fill="#ff9a9a"/>
  <text x="996" y="307" fill="#14313a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="900">归还续借</text>
  <text x="972" y="348" fill="#5b7480" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700">更新状态并回补库存</text> </g><text x="70" y="665" fill="#a8c8d0" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">Portfolio README Diagram</text>
</svg>